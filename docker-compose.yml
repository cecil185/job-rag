services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobrag
      POSTGRES_PASSWORD: jobrag_password
      POSTGRES_DB: jobrag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://jobrag:jobrag_password@postgres:5432/jobrag_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: poetry run streamlit run app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
